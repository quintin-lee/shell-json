name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test
    uses: ./.github/workflows/ci.yml

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(cat VERSION)
          if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
            echo "ERROR: Tag version ($TAG_VERSION) != VERSION file ($FILE_VERSION)"
            exit 1
          fi
          echo "Version consistent: $TAG_VERSION"

      - name: Build release artifact
        run: |
          mkdir -p _dist/shell-json-${{ github.ref_name }}
          cp -r src json.sh VERSION CHANGELOG.md README.md README.zh.md docs examples _dist/shell-json-${{ github.ref_name }}/
          cd _dist
          tar czf shell-json-${{ github.ref_name }}.tar.gz shell-json-${{ github.ref_name }}
          zip -r shell-json-${{ github.ref_name }}.zip shell-json-${{ github.ref_name }}

      - name: Generate release notes
        run: |
          awk '/^## \[/{if (found) exit; if ($2 == "##" && $3 ~ /^\[Unreleased\]/) next; found=1} found{print}' CHANGELOG.md > _dist/release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: shell-json ${{ github.ref_name }}
          body_path: _dist/release-notes.md
          files: |
            _dist/shell-json-${{ github.ref_name }}.tar.gz
            _dist/shell-json-${{ github.ref_name }}.zip
