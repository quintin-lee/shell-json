# CI for shell-json
# Runs the full test suite across supported Bash versions on push/PR.
#
# Part of shell-json (https://github.com/quintin/shell-json)

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bash-version:
          - "4.3"
          - "4.4"
          - "5.0"
          - "5.1"
          - "5.2"
    container:
      image: "bash:${{ matrix.bash-version }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apk add --no-cache coreutils sed

      - name: Run tests
        run: bash tests/run_tests.sh

  fuzz:
    runs-on: ubuntu-latest
    container:
      image: "bash:5.2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apk add --no-cache coreutils sed

      - name: Run fuzz tester
        run: bash tests/fuzz.sh 50
