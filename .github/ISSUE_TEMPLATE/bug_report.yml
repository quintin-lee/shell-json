name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: input
    id: bash-version
    attributes:
      label: Bash Version
      description: Run `bash --version`
      placeholder: "e.g. 5.2.15(1)-release"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Distribution
      placeholder: "e.g. Ubuntu 22.04, macOS 14"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal script to reproduce (3-10 lines preferred)
      render: bash
      placeholder: |
        source json.sh
        root=$(json.parse_string '{"x":1}')
        json.dump "$root"
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Actual Output
      render: text
    validations:
      required: false
